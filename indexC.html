<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>π Approximation Theater</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  :root {
    --blue:    #0055aa;
    --orange:  #ff8800;
    --grey:    #aaaaaa;
    --white:   #ffffff;
    --black:   #000000;
    --dkblue:  #003377;
    --ltgrey:  #cccccc;
  }

  * { margin:0; padding:0; box-sizing:border-box; image-rendering:pixelated; }

  body {
    background:var(--blue);
    color:var(--white);
    font-family:'Share Tech Mono', 'Courier New', monospace;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    font-size:15px;
  }

  /* ── Workbench title bar ── */
  .wb-titlebar {
    background: linear-gradient(90deg,
      var(--orange) 0%, var(--orange) 50%,
      var(--blue)   50%, var(--blue) 100%);
    background-size: 4px 100%;
    padding:3px 6px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:2px solid var(--black);
    flex-wrap:wrap;
    gap:6px;
  }

  .wb-drag {
    background:repeating-linear-gradient(
      90deg,
      var(--orange) 0px, var(--orange) 2px,
      var(--blue)   2px, var(--blue)   4px
    );
    flex:1;
    height:14px;
    min-width:40px;
    border:1px solid var(--black);
  }

  .wb-title {
    font-size:1em;
    font-weight:bold;
    color:var(--white);
    background:var(--dkblue);
    padding:2px 10px;
    border:1px solid var(--black);
    letter-spacing:0.05em;
    text-transform:uppercase;
    white-space:nowrap;
  }

  /* ── Nav buttons — Amiga gadgets ── */
  .nav { display:flex; align-items:center; gap:5px; }
  .nav button {
    background:var(--grey);
    border-top:2px solid var(--white);
    border-left:2px solid var(--white);
    border-bottom:2px solid var(--black);
    border-right:2px solid var(--black);
    color:var(--black);
    padding:3px 12px;
    cursor:pointer;
    font-family:'Share Tech Mono','Courier New',monospace;
    font-size:1em;
    min-width:36px;
  }
  .nav button:active {
    border-top:2px solid var(--black);
    border-left:2px solid var(--black);
    border-bottom:2px solid var(--white);
    border-right:2px solid var(--white);
  }
  .nav button:disabled { opacity:0.35; cursor:default; }
  .counter { color:var(--white); font-size:0.85em; padding:0 6px; }

  /* ── Info panel ── */
  .info {
    background:var(--dkblue);
    border:2px solid var(--black);
    border-top:2px solid var(--grey);
    border-left:2px solid var(--grey);
    margin:6px 8px;
    padding:8px 12px;
  }
  .info-row { display:flex; align-items:baseline; gap:8px; flex-wrap:wrap; margin-bottom:4px; }
  .info-label { color:var(--orange); font-size:0.8em; text-transform:uppercase; white-space:nowrap; }
  .method { color:var(--white); font-size:1em; font-weight:bold; }
  .desc { color:var(--ltgrey); font-size:0.83em; line-height:1.45; margin:4px 0 2px 0; }
  .wit { color:var(--orange); font-size:0.83em; font-style:italic; line-height:1.4; }
  .ts { color:#6688bb; font-size:0.68em; margin-top:5px; }

  .open-full {
    display:inline-block;
    margin-top:6px;
    color:var(--orange);
    font-size:0.75em;
    text-decoration:none;
    border:1px solid var(--orange);
    padding:1px 8px;
  }
  .open-full:hover { background:#ff880022; }

  /* ── Viz frame ── */
  #viz-container {
    flex:1;
    margin:0 8px 8px 8px;
    border-top:2px solid var(--grey);
    border-left:2px solid var(--grey);
    border-bottom:2px solid var(--black);
    border-right:2px solid var(--black);
  }
  iframe { width:100%; height:100%; min-height:80vh; border:none; display:block; background:#000; }
  .waiting { flex:1; display:flex; align-items:center; justify-content:center; color:var(--orange); font-size:1em; padding:40px; text-align:center; }

  /* ── Amiga screen scanlines overlay ── */
  body::after {
    content:'';
    position:fixed;
    top:0; left:0; right:0; bottom:0;
    pointer-events:none;
    background:repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.07) 2px,
      rgba(0,0,0,0.07) 4px
    );
    z-index:9999;
  }
</style>
</head>
<body>

<div class="wb-titlebar">
  <div class="wb-drag"></div>
  <div class="wb-title">π Approximation Theater — Rahim Adatia</div>
  <div class="nav">
    <button id="prev" onclick="nav(-1)">◀</button>
    <span class="counter" id="ctr">— / —</span>
    <button id="next" onclick="nav(1)">▶</button>
  </div>
  <div class="wb-drag"></div>
</div>

<div class="info">
  <div class="info-row">
    <span class="info-label">METHOD:</span>
    <span class="method" id="method">Waiting for agent...</span>
  </div>
  <div class="desc" id="desc"></div>
  <div class="wit" id="wit"></div>
  <div class="ts" id="ts"></div>
  <a class="open-full" id="open-full" href="#" target="_blank">[ OPEN FULL SCREEN ]</a>
</div>

<div id="viz-container"><div class="waiting">*** LOADING VISUALIZATION ***</div></div>

<script>
  let manifest = [], cur = 0;
  async function load() {
    try {
      const r = await fetch("manifest.json?t="+Date.now());
      const data = await r.json();
      const isNew = data.length > manifest.length;
      manifest = data;
      if (isNew || cur === 0) { cur = manifest.length - 1; render(); }
    } catch(e) {}
  }
  function nav(d) { cur = Math.max(0, Math.min(manifest.length-1, cur+d)); render(); }
  async function render() {
    if (!manifest.length) return;
    const v = manifest[cur];
    document.getElementById("ctr").textContent = `${cur+1} / ${manifest.length}`;
    document.getElementById("method").textContent = v.method;
    const lines = (v.oneliner||"").split("\n");
    document.getElementById("desc").textContent = lines[0]||"";
    document.getElementById("wit").textContent = lines[1]||"";
    document.getElementById("ts").textContent = new Date(v.timestamp).toLocaleString();
    document.getElementById("prev").disabled = cur===0;
    document.getElementById("next").disabled = cur===manifest.length-1;
    const container = document.getElementById("viz-container");
    const src = v.filename+"?t="+Date.now();
    container.innerHTML = `<iframe src="${src}" title="${v.method}"></iframe>`;
    document.getElementById("open-full").href = v.filename;
  }
  load();
  setInterval(load, 3.14*60*1000);
</script>
</body>
</html>
