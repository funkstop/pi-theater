<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>π Approximation Theater</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0f; color:#e0e0ff; font-family:"Courier New",monospace; min-height:100vh; display:flex; flex-direction:column; }
  header { padding:12px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #222; flex-wrap:wrap; gap:8px; }
  .title { font-size:1.2em; color:#ff6b9d; font-weight:bold; }
  .sub { font-size:0.7em; color:#555; margin-top:2px; }
  .nav { display:flex; align-items:center; gap:6px; }
  .nav button { background:#1a1a2e; border:1px solid #444; color:#e0e0ff; padding:8px 16px; cursor:pointer; border-radius:4px; font-size:1.1em; touch-action:manipulation; }
  .nav button:hover { background:#2a2a4e; }
  .nav button:disabled { opacity:0.3; cursor:default; }
  .counter { color:#888; font-size:0.85em; }
  .info { padding:10px 16px; background:#0d0d1a; border-bottom:1px solid #222; }
  .method { color:#7fff7f; font-size:1em; }
  .desc { color:#ccc; font-size:0.85em; margin-top:4px; line-height:1.4; }
  .wit { color:#ff9f43; font-size:0.85em; font-style:italic; margin-top:3px; line-height:1.4; }
  .ts { color:#444; font-size:0.68em; margin-top:4px; }
  #viz-container { flex:1; width:100%; min-height:60vh; }
  #viz-container > div { width:100% !important; }
  .waiting { flex:1; display:flex; align-items:center; justify-content:center; color:#333; font-size:1em; padding:40px; text-align:center; }
</style>
</head>
<body>
<header>
  <div>
    <div class="title">π Approximation Theater</div>
    <div class="sub">An agent's ongoing exploration — built by Rahim Adatia</div>
  </div>
  <div class="nav">
    <button id="prev" onclick="nav(-1)">←</button>
    <span class="counter" id="ctr">— / —</span>
    <button id="next" onclick="nav(1)">→</button>
  </div>
</header>
<div class="info">
  <div class="method" id="method">Waiting for agent...</div>
  <div class="desc" id="desc"></div>
  <div class="wit" id="wit"></div>
  <div class="ts" id="ts"></div>
</div>
<div id="viz-container"><div class="waiting">⏳ Loading visualization...</div></div>
<script>
  let manifest = [], cur = 0;

  async function load() {
    try {
      const r = await fetch("manifest.json?t="+Date.now());
      const data = await r.json();
      const isNew = data.length > manifest.length;
      manifest = data;
      if (isNew || cur === 0) { cur = manifest.length - 1; render(); }
    } catch(e) {}
  }

  function nav(d) { cur = Math.max(0, Math.min(manifest.length-1, cur+d)); render(); }

  async function render() {
    if (!manifest.length) return;
    const v = manifest[cur];
    document.getElementById("ctr").textContent = `${cur+1} / ${manifest.length}`;
    document.getElementById("method").textContent = v.method;
    const lines = (v.oneliner||"").split("\n");
    document.getElementById("desc").textContent = lines[0]||"";
    document.getElementById("wit").textContent = lines[1]||"";
    document.getElementById("ts").textContent = new Date(v.timestamp).toLocaleString();
    document.getElementById("prev").disabled = cur===0;
    document.getElementById("next").disabled = cur===manifest.length-1;

    // Load viz HTML and inject just the body content + scripts
    const container = document.getElementById("viz-container");
    container.innerHTML = '<div class="waiting">⏳ Loading...</div>';
    try {
      const res = await fetch(v.filename+"?t="+Date.now());
      const html = await res.text();
      // Extract body content
      const bodyMatch = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
      const bodyContent = bodyMatch ? bodyMatch[1] : html;
      // Extract and re-execute scripts
      const tmp = document.createElement("div");
      tmp.innerHTML = bodyContent;
      container.innerHTML = "";
      // Append non-script elements
      Array.from(tmp.childNodes).forEach(node => {
        if (node.nodeName !== "SCRIPT") container.appendChild(node.cloneNode(true));
      });
      // Re-execute scripts in order
      const scripts = tmp.querySelectorAll("script");
      for (const s of scripts) {
        const ns = document.createElement("script");
        if (s.src) { ns.src = s.src; await new Promise(r => { ns.onload=r; ns.onerror=r; }); }
        else ns.textContent = s.textContent;
        document.head.appendChild(ns);
      }
    } catch(e) { container.innerHTML = `<div class="waiting">⚠️ Could not load visualization</div>`; }
  }

  load();
  setInterval(load, 3.14*60*1000);
</script>
</body>
</html>
