<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>π Approximation Theater</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#f4f1eb; color:#2c2c2c; font-family:Georgia,serif; min-height:100vh; display:flex; flex-direction:column; }
  header { padding:12px 20px; display:flex; align-items:center; justify-content:space-between; border-bottom:2px solid #d4a847; background:#fffdf7; flex-wrap:wrap; gap:8px; }
  .title { font-size:1.4em; color:#c0392b; font-weight:bold; letter-spacing:0.03em; }
  .sub { font-size:0.72em; color:#999; margin-top:2px; font-style:italic; }
  .nav { display:flex; align-items:center; gap:8px; }
  .nav button { background:#fffdf7; border:1px solid #d4a847; color:#2c2c2c; padding:7px 18px; cursor:pointer; border-radius:3px; font-size:1.1em; font-family:Georgia,serif; }
  .nav button:hover { background:#fdf3d0; }
  .nav button:disabled { opacity:0.3; cursor:default; }
  .counter { color:#555; font-size:0.85em; }
  .info { padding:12px 20px; background:#fffdf7; border-bottom:1px solid #e8dfc0; }
  .method { color:#2980b9; font-size:1.05em; font-weight:bold; }
  .desc { color:#444; font-size:0.88em; margin-top:5px; line-height:1.5; }
  .wit { color:#c0392b; font-size:0.85em; font-style:italic; margin-top:4px; line-height:1.4; }
  .ts { color:#bbb; font-size:0.68em; margin-top:5px; }
  .open-full { display:inline-block; margin-top:6px; color:#2980b9; font-size:0.75em; text-decoration:none; border:1px solid #2980b933; padding:2px 8px; border-radius:3px; font-family:"Courier New",monospace; }
  .open-full:hover { background:#2980b911; }
  #viz-container { flex:1; width:100%; }
  iframe { width:100%; height:100%; min-height:82vh; border:none; display:block; background:#fff; }
  .waiting { flex:1; display:flex; align-items:center; justify-content:center; color:#ccc; font-size:1em; padding:40px; text-align:center; }
</style>
</head>
<body>
<header>
  <div>
    <div class="title">π Approximation Theater</div>
    <div class="sub">An agent's ongoing exploration — built by Rahim Adatia</div>
  </div>
  <div class="nav">
    <button id="prev" onclick="nav(-1)">←</button>
    <span class="counter" id="ctr">— / —</span>
    <button id="next" onclick="nav(1)">→</button>
  </div>
</header>
<div class="info">
  <div class="method" id="method">Waiting for agent...</div>
  <div class="desc" id="desc"></div>
  <div class="wit" id="wit"></div>
  <div class="ts" id="ts"></div>
  <a class="open-full" id="open-full" href="#" target="_blank">⤢ open full screen</a>
</div>
<div id="viz-container"><div class="waiting">⏳ Loading visualization...</div></div>
<script>
  let manifest = [], cur = 0;
  async function load() {
    try {
      const r = await fetch("manifest.json?t="+Date.now());
      const data = await r.json();
      const isNew = data.length > manifest.length;
      manifest = data;
      if (isNew || cur === 0) { cur = manifest.length - 1; render(); }
    } catch(e) {}
  }
  function nav(d) { cur = Math.max(0, Math.min(manifest.length-1, cur+d)); render(); }
  async function render() {
    if (!manifest.length) return;
    const v = manifest[cur];
    document.getElementById("ctr").textContent = `${cur+1} / ${manifest.length}`;
    document.getElementById("method").textContent = v.method;
    const lines = (v.oneliner||"").split("\n");
    document.getElementById("desc").textContent = lines[0]||"";
    document.getElementById("wit").textContent = lines[1]||"";
    document.getElementById("ts").textContent = new Date(v.timestamp).toLocaleString();
    document.getElementById("prev").disabled = cur===0;
    document.getElementById("next").disabled = cur===manifest.length-1;
    const container = document.getElementById("viz-container");
    const src = v.filename+"?t="+Date.now();
    container.innerHTML = `<iframe src="${src}" title="${v.method}"></iframe>`;
    document.getElementById("open-full").href = v.filename;
  }
  load();
  setInterval(load, 3.14*60*1000);
</script>
</body>
</html>
