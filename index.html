<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>π Approximation Theater</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0f; color:#e0e0ff; font-family:"Courier New",monospace; height:100vh; display:flex; flex-direction:column; }
  header { padding:14px 24px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #222; }
  .title { font-size:1.4em; color:#ff6b9d; font-weight:bold; }
  .sub { font-size:0.75em; color:#555; margin-top:3px; }
  .nav button { background:#1a1a2e; border:1px solid #444; color:#e0e0ff; padding:8px 18px; cursor:pointer; border-radius:4px; font-size:1.2em; }
  .nav button:hover { background:#2a2a4e; }
  .nav button:disabled { opacity:0.3; cursor:default; }
  .counter { color:#888; font-size:0.9em; margin:0 12px; }
  .info { padding:10px 24px; background:#0d0d1a; border-bottom:1px solid #222; }
  .method { color:#7fff7f; font-size:1.05em; }
  .oneliner { color:#ccc; font-size:0.88em; margin-top:3px; }
  .oneliner .desc { color:#ccc; }
  .oneliner .wit { color:#ff9f43; font-style:italic; margin-top:2px; }
  .ts { color:#444; font-size:0.72em; margin-top:2px; }
  iframe { flex:1; border:none; width:100%; }
  .empty { flex:1; display:flex; align-items:center; justify-content:center; color:#333; font-size:1.1em; }
</style>
</head>
<body>
<header>
  <div><div class="title">π Approximation Theater</div><div class="sub">An agent's ongoing exploration — built by Rahim Adatia</div></div>
  <div class="nav">
    <button id="prev" onclick="nav(-1)">←</button>
    <span class="counter" id="ctr">— / —</span>
    <button id="next" onclick="nav(1)">→</button>
  </div>
</header>
<div class="info">
  <div class="method" id="method">Waiting for agent...</div>
  <div class="oneliner" id="oneliner"></div>
  <div class="ts" id="ts"></div>
</div>
<iframe id="frame" src="about:blank"></iframe>
<script>
  let manifest = [], cur = 0;
  async function load() {
    try {
      const r = await fetch("manifest.json?t="+Date.now());
      const data = await r.json();
      const isNew = data.length > manifest.length;
      manifest = data;
      if (isNew || cur === 0) { cur = manifest.length - 1; render(); }
    } catch(e) {}
  }
  function nav(d) { cur = Math.max(0, Math.min(manifest.length-1, cur+d)); render(); }
  function render() {
    if (!manifest.length) return;
    const v = manifest[cur];
    document.getElementById("ctr").textContent = `${cur+1} / ${manifest.length}`;
    document.getElementById("method").textContent = v.method;
    const lines = v.oneliner.split("\n");
    document.getElementById("oneliner").innerHTML = `<div class="desc">${lines[0]||""}</div><div class="wit">${lines[1]||""}</div>`;
    document.getElementById("ts").textContent = new Date(v.timestamp).toLocaleString();
    document.getElementById("frame").src = v.filename+"?t="+Date.now();
    document.getElementById("prev").disabled = cur===0;
    document.getElementById("next").disabled = cur===manifest.length-1;
  }
  load();
  setInterval(load, 3.14*60*1000);
</script>
</body></html>
